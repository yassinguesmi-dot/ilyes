services:
  postgres:
    image: postgres:16-alpine
    container_name: techshop-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: techshop
      POSTGRES_PASSWORD: techshop
      POSTGRES_DB: techshop
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: techshop-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: techshop-elasticsearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data

  backend:
    image: node:20-bookworm-slim
    container_name: techshop-backend
    restart: unless-stopped
    working_dir: /app
    depends_on:
      - postgres
      - redis
      - elasticsearch
    volumes:
      - ./backend:/app
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: development
      PORT: "4000"
      DATABASE_URL: "postgresql://techshop:techshop@postgres:5432/techshop?schema=public"
      REDIS_URL: "redis://redis:6379"
      ELASTICSEARCH_NODE: "http://elasticsearch:9200"
      JWT_ACCESS_TOKEN_SECRET: "dev_access_secret_change_me"
      JWT_REFRESH_TOKEN_SECRET: "dev_refresh_secret_change_me"
      ACCESS_TOKEN_TTL_MINUTES: "15"
      REFRESH_TOKEN_TTL_DAYS: "7"
      CORS_ORIGIN: "http://localhost:19006"
    command: ["sh", "-lc", "npm install && npm run dev"]

volumes:
  postgres_data:
  redis_data:
  es_data:
